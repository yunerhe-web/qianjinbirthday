<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千金的1岁生日邀请函</title>
    <style>
        :root {
            --primary-blue: #e3f2fd;
            --gold: #d4af37;
            --cream: #fffdf5;
            --soft-pink: #fce4ec;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--cream);
            overflow-x: hidden;
            color: #555;
        }

        /* 梦幻背景粒子 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, var(--cream) 0%, var(--primary-blue) 100%);
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 10s infinite linear;
        }

        /* 封面层 */
        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #fff 0%, var(--primary-blue) 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gift-box {
            font-size: 80px;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            animation: bounce 2s infinite;
        }

        /* 正文内容 */
        .content {
            padding: 40px 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
        }

        .show-content .content {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-frame {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: url('https://postimg.cc/B8qY84VY') center/cover;
        }

        .crown {
            position: absolute;
            top: -25px;
            right: 10px;
            font-size: 40px;
            transform: rotate(15deg);
        }

        h1 {
            color: var(--gold);
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .invitation-text {
            line-height: 1.8;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px dashed var(--gold);
        }

        /* 互动区域 */
        .interaction-zone {
            margin-top: 30px;
        }

        .paw-btn {
            display: inline-block;
            background: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin: 10px;
            cursor: pointer;
            transition: transform 0.3s;
            border: none;
            font-size: 1rem;
            color: #777;
        }

        .paw-btn:active { transform: scale(0.9); }

        #info-display {
            min-height: 60px;
            margin-top: 20px;
            font-weight: bold;
            color: var(--gold);
        }

        /* 动画定义 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); }
            100% { transform: translateY(-100px) translateX(50px); }
        }

        .hidden { transform: translateY(-100%) !important; }
    </style>
</head>
<body>

    <div class="bg-particles" id="particles"></div>

    <div id="cover" onclick="openInvite()">
        <div class="gift-box">🎁</div>
        <p style="margin-top:20px; color: #888; font-style: italic;">点击开启千金的生日礼盒</p>
    </div>

    <div class="content-wrapper" id="mainPage">
        <div class="content">
            <div class="photo-frame">
                <div class="crown">👑</div>
            </div>
            
            <h1>千金一岁啦！</h1>
            <p style="color: #999;">Ragdoll 1st Birthday Party</p>

            <div class="invitation-text">
                我是千金，那只眼里有星辰的布偶猫。<br>
                在地球漫游的第365天，<br>
                我想邀请最重要的你，<br>
                来参加我的奶油色生日派对！🐾
            </div>

            <div class="interaction-zone">
                <p>—— 滑动或点击猫爪查看秘籍 ——</p>
                <button class="paw-btn" onclick="showInfo('date')">📅 派对日期</button>
                <button class="paw-btn" onclick="showInfo('location')">📍 派对坐标</button>
                <div id="info-display">点击上方猫爪确认行程</div>
            </div>

            <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px;">
                <p>2026年7月4日 · 期待相见</p>
                <div style="font-size: 24px;">🐟 ✨ 🧶</div>
            </div>
        </div>
    </div>

    <script>
        // 开启邀请函
        function openInvite() {
            document.getElementById('cover').classList.add('hidden');
            document.body.classList.add('show-content');
        }

        // 交互信息展示
        function showInfo(type) {
            const display = document.getElementById('info-display');
            if(type === 'date') {
                display.innerText = "2026年7月4日 (全天候宠爱)";
            } else {
                display.innerText = "千金的秘密基地 (39 Quai de Versailles, 44000 Nantes)";
            }
        }

        // 生成背景粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 20 + 10 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 5 + 5 + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(p);
        }
    </script>
</body>
</html>
